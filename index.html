<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kisten Inventar</title>
<meta name="theme-color" content="#111827">
<style>
:root{--bg:#f3f4f6;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--dark:#111827;--accent:#2563eb}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--dark);color:white;padding:18px 14px 12px;position:sticky;top:0;z-index:5}
h1{margin:0;font-size:22px} header p{margin:3px 0 12px;color:#d1d5db;font-size:13px}
nav{display:flex;gap:8px;overflow-x:auto}
nav button{border:0;border-radius:999px;padding:10px 14px;background:#374151;color:white;font-weight:700;white-space:nowrap}
nav button.active{background:white;color:#111827}
main{padding:14px;max-width:850px;margin:auto}
.card{background:var(--card);border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
h2{font-size:19px;margin:0 0 10px}
label{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px}
input,textarea{width:100%;border:1px solid #d1d5db;border-radius:13px;padding:13px;font-size:16px;background:white}
textarea{min-height:80px;resize:vertical}
button{border:0;border-radius:13px;padding:12px 14px;font-size:15px;font-weight:700;margin-top:10px}
.primary{background:var(--accent);color:white;width:100%}.secondary{background:#e5e7eb;color:#111827}.danger{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#f9fafb;border:1px solid var(--line);border-radius:15px;padding:13px}.stat b{display:block;font-size:23px}.stat span{font-size:12px;color:var(--muted)}
.item,.box{border:1px solid var(--line);border-radius:15px;padding:12px;margin-top:10px;background:white}
.item h3,.box h3{margin:0 0 6px;font-size:18px}.pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 8px;margin:0 5px 6px 0;font-size:12px}
.art{display:inline-block;background:#ecfdf5;color:#166534;border-radius:999px;padding:4px 8px;margin:0 5px 6px 0;font-size:12px;font-weight:700}
.meta{font-size:14px;color:var(--muted);margin:4px 0;line-height:1.4}.actions{display:flex;gap:8px;margin-top:8px}.actions button{flex:1;margin-top:0}
.hidden{display:none}.preview{width:100%;max-height:220px;object-fit:cover;border-radius:13px;margin-top:8px;border:1px solid var(--line)}
.small{font-size:12px;color:var(--muted);line-height:1.45}.empty{text-align:center;color:var(--muted);padding:20px}
@media(max-width:560px){.grid,.two{grid-template-columns:1fr}.actions{flex-direction:column}}
</style>
</head>
<body>
<header>
<h1>Kisten Inventar</h1>
<p>Offline speichern · Artikelnummer · Farbe · Größe</p>
<nav>
<button id="tabOverview" class="active" onclick="show('overview')">Übersicht</button>
<button id="tabSearch" onclick="show('search')">Suche</button>
<button id="tabAdd" onclick="show('add')">Hinzufügen</button>
<button id="tabBackup" onclick="show('backup')">Backup</button>
</nav>
</header>

<main>
<section id="overview">
<div class="card"><h2>Gesamtübersicht</h2><div class="grid">
<div class="stat"><b id="countItems">0</b><span>Gegenstände</span></div>
<div class="stat"><b id="countBoxes">0</b><span>Kisten</span></div>
<div class="stat"><b id="countCats">0</b><span>Kategorien</span></div>
</div></div>
<div class="card"><h2>Deine Kisten</h2><div id="boxList"></div></div>
</section>

<section id="search" class="hidden">
<div class="card"><h2>Suchen</h2><input id="searchInput" placeholder="Artikelnummer, Name, Farbe, Größe, Kiste..." oninput="renderSearch()"><p class="small" id="searchCount"></p></div>
<div class="card"><h2>Treffer</h2><div id="results"></div></div>
</section>

<section id="add" class="hidden">
<div class="card"><h2 id="formTitle">Gegenstand hinzufügen</h2>
<label>Artikelnummer</label><input id="article" placeholder="z. B. 100001 oder A-001">
<div class="two"><div><label>Kiste</label><input id="boxInput" placeholder="z. B. Kiste 1"></div><div><label>Kategorie</label><input id="catInput" placeholder="z. B. Kleidung, Kabel"></div></div>
<label>Gegenstand</label><input id="nameInput" placeholder="z. B. USB-C Ladekabel">
<div class="two"><div><label>Farbe</label><input id="colorInput" placeholder="z. B. schwarz, rot, transparent"></div><div><label>Größe</label><input id="sizeInput" placeholder="z. B. XL, M8, 2m, 40x60"></div></div>
<div class="two"><div><label>Menge</label><input id="qtyInput" type="number" min="1" value="1"></div><div><label>Standort</label><input id="placeInput" placeholder="z. B. Keller, Regal links"></div></div>
<label>Beschreibung</label><textarea id="descInput" placeholder="Weitere Details"></textarea>
<label>Foto optional</label><input id="photoInput" type="file" accept="image/*" onchange="loadPhoto(event)"><img id="photoPreview" class="preview hidden">
<button class="primary" id="saveBtn" onclick="saveItem()">Speichern</button><button id="cancelBtn" class="secondary hidden" onclick="cancelEdit()">Abbrechen</button>
</div></section>

<section id="backup" class="hidden">
<div class="card"><h2>Backup</h2>
<button class="secondary" onclick="exportCSV()">CSV speichern</button>
<button class="secondary" onclick="document.getElementById('importFile').click()">CSV importieren</button>
<button class="danger" onclick="clearAll()">Alles löschen</button>
<input id="importFile" type="file" accept=".csv,text/csv" style="display:none" onchange="importCSV(event)">
<p class="small">Speichert automatisch auf deinem Handy. Für Sicherheit regelmäßig CSV speichern.</p></div>
</section>
</main>

<script>
let items = JSON.parse(
  localStorage.getItem("kistenInventarEasyV7") ||
  localStorage.getItem("kistenInventarEasyV6") ||
  localStorage.getItem("kistenInventarEasyV4") ||
  localStorage.getItem("kistenInventarEasyV3") ||
  "[]"
);

let editIndex = null;
let currentPhoto = "";

const $ = (id) => document.getElementById(id);
const val = (id) => ($(id)?.value || "").trim();
const setVal = (id, value) => { const el = $(id); if (el) el.value = value || ""; };

function saveLocal(){
  localStorage.setItem("kistenInventarEasyV7", JSON.stringify(items));
}

function n(v){ return (v || "").toString().toLowerCase().trim(); }

function e(s){
  return String(s || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

function unique(a){
  return [...new Set(a.filter(Boolean))].sort((x,y)=>x.localeCompare(y,"de",{numeric:true}));
}

function show(id){
  ["overview","search","add","backup"].forEach(x => $(x).classList.add("hidden"));
  $(id).classList.remove("hidden");

  ["tabOverview","tabSearch","tabAdd","tabBackup"].forEach(x => $(x).classList.remove("active"));
  $("tab" + id[0].toUpperCase() + id.slice(1)).classList.add("active");

  renderAll();
}

function renderAll(){
  renderOverview();
  renderSearch();
}

function renderOverview(){
  const boxes = unique(items.map(i => i.box));
  const cats = unique(items.map(i => i.cat));

  $("countItems").textContent = items.reduce((s,i)=>s+(parseInt(i.qty)||1),0);
  $("countBoxes").textContent = boxes.length;
  $("countCats").textContent = cats.length;

  if(!boxes.length){
    $("boxList").innerHTML = "<div class='empty'>Noch nichts eingetragen.</div>";
    return;
  }

  $("boxList").innerHTML = boxes.map(b => {
    const inside = items.filter(i => i.box === b);
    const qty = inside.reduce((s,i)=>s+(parseInt(i.qty)||1),0);
    return `<div class="box" onclick="openBox('${e(b).replaceAll("'","\\'")}')">
      <h3>${e(b)}</h3>
      <span class="pill">${inside.length} Einträge</span>
      <span class="pill">${qty} Stück</span>
      <p class="meta">Antippen, um diese Kiste zu öffnen.</p>
    </div>`;
  }).join("");
}

function openBox(b){
  show("search");
  setVal("searchInput", b);
  renderSearch();
}

function renderSearch(){
  const searchEl = $("searchInput");
  if(!searchEl || !$("results")) return;

  const q = n(searchEl.value);
  const res = items.filter(i =>
    !q || n([i.article,i.box,i.cat,i.name,i.color,i.itemSize,i.size,i.desc,i.place].join(" ")).includes(q)
  );

  $("searchCount").textContent = `${res.length} Treffer von ${items.length} Einträgen`;

  if(!res.length){
    $("results").innerHTML = "<div class='empty'>Keine Treffer gefunden.</div>";
    return;
  }

  $("results").innerHTML = res.map(i => {
    const idx = items.indexOf(i);
    const shownSize = i.itemSize || i.size || "";
    return `<div class="item">
      <h3>${e(i.name)}</h3>
      ${i.article ? `<span class="art">Art.-Nr. ${e(i.article)}</span>` : ""}
      <span class="pill">${e(i.box)}</span>
      ${i.cat ? `<span class="pill">${e(i.cat)}</span>` : ""}
      ${i.color ? `<span class="pill">Farbe: ${e(i.color)}</span>` : ""}
      ${shownSize ? `<span class="pill">Größe: ${e(shownSize)}</span>` : ""}
      <span class="pill">${e(i.qty || 1)}x</span>
      ${i.photo ? `<img class="preview" src="${i.photo}">` : ""}
      ${i.desc ? `<p class="meta"><b>Beschreibung:</b> ${e(i.desc)}</p>` : ""}
      ${i.place ? `<p class="meta"><b>Standort:</b> ${e(i.place)}</p>` : ""}
      <div class="actions">
        <button class="ok" onclick="editItem(${idx})">Bearbeiten</button>
        <button class="danger" onclick="deleteItem(${idx})">Löschen</button>
      </div>
    </div>`;
  }).join("");
}

function loadPhoto(ev){
  const f = ev.target.files[0];
  if(!f) return;

  const r = new FileReader();
  r.onload = x => {
    currentPhoto = x.target.result;
    $("photoPreview").src = currentPhoto;
    $("photoPreview").classList.remove("hidden");
  };
  r.readAsDataURL(f);
}

function saveItem(){
  const item = {
    article: val("article"),
    box: val("boxInput"),
    cat: val("catInput"),
    name: val("nameInput"),
    color: val("colorInput"),
    itemSize: val("sizeInput"),
    qty: val("qtyInput") || "1",
    desc: val("descInput"),
    place: val("placeInput"),
    photo: currentPhoto,
    updated: new Date().toLocaleString("de-DE")
  };

  if(!item.box || !item.name){
    alert("Bitte mindestens Kiste und Gegenstand eintragen.");
    return;
  }

  if(editIndex !== null && editIndex >= 0){
    items[editIndex] = item;
  } else {
    items.push(item);
  }

  saveLocal();
  clearForm();
  show("overview");
}

function editItem(idx){
  const i = items[idx];
  editIndex = idx;

  $("formTitle").textContent = "Gegenstand bearbeiten";
  $("saveBtn").textContent = "Update speichern";

  setVal("article", i.article || "");
  setVal("boxInput", i.box || "");
  setVal("catInput", i.cat || "");
  setVal("nameInput", i.name || "");
  setVal("colorInput", i.color || "");
  setVal("sizeInput", i.itemSize || i.size || "");
  setVal("qtyInput", i.qty || "1");
  setVal("descInput", i.desc || "");
  setVal("placeInput", i.place || "");

  currentPhoto = i.photo || "";
  if(currentPhoto){
    $("photoPreview").src = currentPhoto;
    $("photoPreview").classList.remove("hidden");
  } else {
    $("photoPreview").classList.add("hidden");
  }

  $("cancelBtn").classList.remove("hidden");
  show("add");
}

function clearForm(){
  ["article","boxInput","catInput","nameInput","colorInput","sizeInput","descInput","placeInput"].forEach(id => setVal(id,""));
  setVal("qtyInput","1");
  $("photoInput").value = "";
  $("photoPreview").classList.add("hidden");
  currentPhoto = "";
  editIndex = null;
  $("formTitle").textContent = "Gegenstand hinzufügen";
  $("saveBtn").textContent = "Speichern";
  $("cancelBtn").classList.add("hidden");
}

function cancelEdit(){
  clearForm();
  show("overview");
}

function deleteItem(idx){
  if(confirm("Diesen Eintrag wirklich löschen?")){
    items.splice(idx,1);
    saveLocal();
    renderAll();
  }
}

function clearAll(){
  if(confirm("Wirklich alles löschen? Vorher am besten Backup speichern.")){
    items = [];
    saveLocal();
    renderAll();
    show("overview");
  }
}

function exportCSV(){
  const rows = [
    ["Artikelnummer","Kiste","Kategorie","Gegenstand","Farbe","Größe","Menge","Beschreibung","Standort"],
    ...items.map(i => [i.article || "", i.box, i.cat, i.name, i.color || "", i.itemSize || i.size || "", i.qty, i.desc, i.place])
  ];

  const csv = rows.map(r => r.map(v => '"' + String(v || "").replaceAll('"','""') + '"').join(";")).join("\n");
  const blob = new Blob(["\ufeff" + csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "kisten-inventar-backup.csv";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function parseLine(line){
  const out=[];
  let cur="", quote=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i], next=line[i+1];
    if(ch=='"' && quote && next=='"'){cur+='"';i++}
    else if(ch=='"'){quote=!quote}
    else if(ch==";" && !quote){out.push(cur);cur=""}
    else cur+=ch;
  }
  out.push(cur);
  return out;
}

function importCSV(ev){
  const f = ev.target.files[0];
  if(!f) return;

  const r = new FileReader();
  r.onload = x => {
    const lines = x.target.result.split(/\r?\n/).filter(Boolean);
    const header = parseLine(lines[0] || "").map(h => n(h));
    const hasArticle = header[0]?.includes("artikel");
    const hasColor = header.includes("farbe");

    const add = lines.slice(1).map(parseLine).map(row => {
      if(hasArticle && hasColor){
        return {article:row[0]||"", box:row[1]||"", cat:row[2]||"", name:row[3]||"", color:row[4]||"", itemSize:row[5]||"", qty:row[6]||"1", desc:row[7]||"", place:row[8]||"", photo:"", updated:new Date().toLocaleString("de-DE")};
      }
      if(hasArticle){
        return {article:row[0]||"", box:row[1]||"", cat:row[2]||"", name:row[3]||"", color:"", itemSize:"", qty:row[4]||"1", desc:row[5]||"", place:row[6]||"", photo:"", updated:new Date().toLocaleString("de-DE")};
      }
      return {article:"", box:row[0]||"", cat:row[1]||"", name:row[2]||"", color:"", itemSize:"", qty:row[3]||"1", desc:row[4]||"", place:row[5]||"", photo:"", updated:new Date().toLocaleString("de-DE")};
    }).filter(i => i.box && i.name);

    items = items.concat(add);
    saveLocal();
    renderAll();
    alert(add.length + " Einträge importiert.");
  };
  r.readAsText(f, "utf-8");
}

renderAll();
</script>
</body>
</html>
