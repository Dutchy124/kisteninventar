<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kisten Inventar</title>
<style>
body{margin:0;background:#f3f4f6;font-family:Arial,sans-serif;color:#111827}
header{background:#111827;color:white;padding:16px;position:sticky;top:0;z-index:5}
nav{display:flex;gap:8px;overflow:auto;margin-top:10px}
button{border:0;border-radius:10px;padding:11px 13px;font-weight:700;background:#2563eb;color:white;margin-top:8px}
nav button{background:#374151;white-space:nowrap}.active{background:white!important;color:#111827!important}
main{padding:14px;max-width:850px;margin:auto}.card{background:white;border-radius:15px;padding:14px;margin-bottom:14px;box-shadow:0 2px 10px #0001}
input,textarea{width:100%;box-sizing:border-box;border:1px solid #ccc;border-radius:10px;padding:12px;font-size:16px;margin:4px 0 10px}
textarea{min-height:75px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none}
.item,.box{border:1px solid #e5e7eb;border-radius:12px;padding:11px;margin-top:10px}.pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 8px;margin:3px;font-size:12px}
.good{background:#dcfce7;color:#166534}.bad{background:#fee2e2;color:#991b1b}.grey{background:#e5e7eb;color:#111827}
.photo{width:100%;max-height:220px;object-fit:cover;border-radius:12px;margin-top:8px;border:1px solid #e5e7eb}
@media(max-width:600px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h2 style="margin:0">Kisten Inventar</h2>
<div style="font-size:13px;color:#d1d5db">Version 10 – Fotos stabil gespeichert</div>
<nav>
<button id="tOverview" class="active" onclick="show('overview')">Übersicht</button>
<button id="tSearch" onclick="show('search')">Suche</button>
<button id="tAdd" onclick="show('add')">Hinzufügen</button>
<button id="tBackup" onclick="show('backup')">Backup</button>
</nav>
</header>

<main>
<section id="overview">
<div class="card"><h3>Übersicht</h3><div id="stats"></div></div>
<div class="card"><h3>Kisten</h3><div id="boxes"></div></div>
</section>

<section id="search" class="hidden">
<div class="card"><h3>Suche</h3><input id="q" placeholder="Artikelnummer, Name, Farbe, Größe, Kiste..." oninput="render()"><div id="count"></div></div>
<div class="card"><h3>Treffer</h3><div id="results"></div></div>
</section>

<section id="add" class="hidden">
<div class="card">
<h3 id="formTitle">Gegenstand hinzufügen</h3>
<label>Artikelnummer</label><input id="article">
<div class="row"><div><label>Kiste</label><input id="box"></div><div><label>Kategorie</label><input id="cat"></div></div>
<label>Gegenstand</label><input id="name">
<div class="row"><div><label>Farbe</label><input id="color"></div><div><label>Größe</label><input id="sizeField"></div></div>
<div class="row"><div><label>Menge</label><input id="qty" type="number" min="1" value="1"></div><div><label>Standort</label><input id="place"></div></div>
<label>Beschreibung</label><textarea id="desc"></textarea>
<label>Foto</label><input id="photoInput" type="file" accept="image/*" onchange="selectPhoto(event)">
<img id="photoPreview" class="photo hidden">
<button onclick="saveItem()" id="saveBtn">Speichern</button>
<button class="grey hidden" id="cancelBtn" onclick="cancelEdit()">Abbrechen</button>
</div>
</section>

<section id="backup" class="hidden">
<div class="card">
<h3>Backup</h3>
<button class="grey" onclick="exportCSV()">CSV speichern ohne Fotos</button>
<button class="grey" onclick="document.getElementById('importFile').click()">CSV importieren</button>
<button class="grey" onclick="cleanOldStorage()">Alte Speicherreste löschen</button>
<button class="bad" onclick="clearAll()">Alles löschen</button>
<input id="importFile" type="file" accept=".csv,text/csv" style="display:none" onchange="importCSV(event)">
<p style="font-size:13px;color:#666">Fotos werden jetzt stabil im Handyspeicher der Webseite gespeichert. CSV-Backup enthält aktuell nur Textdaten, keine Fotos.</p>
</div>
</section>
</main>

<script>
const DB_NAME='KistenInventarDB';
const STORE='items';
const OLD=['kistenInventarStableV9','kistenInventarDataV81','kistenInventarDataV8','kistenInventarEasyV7','kistenInventarEasyV6','kistenInventarEasyV4','kistenInventarEasyV3'];
let db=null, items=[], editId=null, selectedPhotoBlob=null, keepOldPhoto=true;

function $(id){return document.getElementById(id)}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function unique(a){return[...new Set(a.filter(Boolean))].sort((x,y)=>x.localeCompare(y,'de',{numeric:true}))}
function clean(i){return{
 id:i.id||crypto.randomUUID(),
 article:i.article||'', box:i.box||'', cat:i.cat||'', name:i.name||'',
 color:i.color||'', sizeField:i.sizeField||i.itemSize||i.size||'',
 qty:i.qty||'1', place:i.place||'', desc:i.desc||'', updated:i.updated||'',
 photo:i.photo||null
}}

function openDB(){
 return new Promise((resolve,reject)=>{
  const req=indexedDB.open(DB_NAME,1);
  req.onupgradeneeded=e=>{
   const database=e.target.result;
   if(!database.objectStoreNames.contains(STORE)){
    database.createObjectStore(STORE,{keyPath:'id'});
   }
  };
  req.onsuccess=e=>resolve(e.target.result);
  req.onerror=()=>reject(req.error);
 });
}

function tx(mode='readonly'){
 return db.transaction(STORE,mode).objectStore(STORE);
}

function getAllItems(){
 return new Promise((resolve,reject)=>{
  const req=tx().getAll();
  req.onsuccess=()=>resolve(req.result.map(clean));
  req.onerror=()=>reject(req.error);
 });
}

function putItem(item){
 return new Promise((resolve,reject)=>{
  const req=tx('readwrite').put(clean(item));
  req.onsuccess=()=>resolve();
  req.onerror=()=>reject(req.error);
 });
}

function deleteDBItem(id){
 return new Promise((resolve,reject)=>{
  const req=tx('readwrite').delete(id);
  req.onsuccess=()=>resolve();
  req.onerror=()=>reject(req.error);
 });
}

function clearDB(){
 return new Promise((resolve,reject)=>{
  const req=tx('readwrite').clear();
  req.onsuccess=()=>resolve();
  req.onerror=()=>reject(req.error);
 });
}

async function migrateOld(){
 if(items.length) return;
 for(const k of OLD){
  try{
   const raw=localStorage.getItem(k);
   if(raw){
    const arr=JSON.parse(raw);
    if(Array.isArray(arr) && arr.length){
     for(const old of arr){
      const item=clean(old);
      // alte base64-Fotos übernehmen, falls vorhanden
      if(typeof old.photo==='string' && old.photo.startsWith('data:')){
       item.photo=old.photo;
      }
      await putItem(item);
     }
     items=await getAllItems();
     return;
    }
   }
  }catch(e){}
 }
}

async function init(){
 try{
  db=await openDB();
  items=await getAllItems();
  await migrateOld();
  items=await getAllItems();
  render();
 }catch(e){
  alert('Die Datenbank konnte nicht geöffnet werden. Bitte nutze Chrome oder Samsung Internet und lade die Seite neu.');
  console.error(e);
 }
}

function show(id){
 ['overview','search','add','backup'].forEach(x=>$(x).classList.add('hidden'));
 $(id).classList.remove('hidden');
 ['tOverview','tSearch','tAdd','tBackup'].forEach(x=>$(x).classList.remove('active'));
 $('t'+id[0].toUpperCase()+id.slice(1)).classList.add('active');
 render();
}

function render(){
 const boxes=unique(items.map(i=>i.box)), cats=unique(items.map(i=>i.cat));
 $('stats').innerHTML='<b>'+items.reduce((s,i)=>s+(parseInt(i.qty)||1),0)+'</b> Gegenstände · <b>'+boxes.length+'</b> Kisten · <b>'+cats.length+'</b> Kategorien';
 $('boxes').innerHTML=boxes.length?boxes.map(b=>{
  const inside=items.filter(i=>i.box==b);
  const qty=inside.reduce((s,i)=>s+(parseInt(i.qty)||1),0);
  return '<div class="box" onclick="openBox(\\''+esc(b).replaceAll("'","\\\\'")+'\\')"><b>'+esc(b)+'</b><br><span class="pill">'+inside.length+' Einträge</span><span class="pill">'+qty+' Stück</span></div>';
 }).join(''):'Noch nichts eingetragen.';

 const q=($('q')?.value||'').toLowerCase().trim();
 const res=items.filter(i=>!q||[i.article,i.box,i.cat,i.name,i.color,i.sizeField,i.place,i.desc].join(' ').toLowerCase().includes(q));
 if($('count'))$('count').textContent=res.length+' Treffer von '+items.length+' Einträgen';
 if($('results'))$('results').innerHTML=res.length?res.map(card).join(''):'Keine Treffer gefunden.';
}

function photoSrc(photo){
 if(!photo) return '';
 if(typeof photo==='string') return photo;
 return URL.createObjectURL(photo);
}

function card(i){
 const src=photoSrc(i.photo);
 return '<div class="item"><b>'+esc(i.name)+'</b><br>'+
 (i.article?'<span class="pill good">Art.-Nr. '+esc(i.article)+'</span>':'')+
 '<span class="pill">'+esc(i.box)+'</span>'+
 (i.cat?'<span class="pill">'+esc(i.cat)+'</span>':'')+
 (i.color?'<span class="pill">Farbe: '+esc(i.color)+'</span>':'')+
 (i.sizeField?'<span class="pill">Größe: '+esc(i.sizeField)+'</span>':'')+
 '<span class="pill">'+esc(i.qty)+'x</span>'+
 (src?'<img class="photo" src="'+src+'">':'')+
 (i.place?'<p>Standort: '+esc(i.place)+'</p>':'')+
 (i.desc?'<p>'+esc(i.desc)+'</p>':'')+
 '<button class="good" onclick="editItemById(\\''+i.id+'\\')">Bearbeiten</button> <button class="bad" onclick="deleteItemById(\\''+i.id+'\\')">Löschen</button></div>';
}

function openBox(b){show('search');$('q').value=b;render()}

function selectPhoto(ev){
 const file=ev.target.files[0];
 if(!file) return;
 const reader=new FileReader();
 reader.onload=x=>{
  selectedPhotoBlob=file;
  keepOldPhoto=false;
  $('photoPreview').src=x.target.result;
  $('photoPreview').classList.remove('hidden');
 };
 reader.readAsDataURL(file);
}

function getForm(){
 const existing=editId?items.find(i=>i.id===editId):null;
 return clean({
  id: editId || crypto.randomUUID(),
  article:$('article').value.trim(), box:$('box').value.trim(), cat:$('cat').value.trim(), name:$('name').value.trim(),
  color:$('color').value.trim(), sizeField:$('sizeField').value.trim(), qty:$('qty').value||'1',
  place:$('place').value.trim(), desc:$('desc').value.trim(), updated:new Date().toLocaleString('de-DE'),
  photo: selectedPhotoBlob ? selectedPhotoBlob : (keepOldPhoto && existing ? existing.photo : null)
 });
}

async function saveItem(){
 const item=getForm();
 if(!item.box||!item.name){alert('Bitte mindestens Kiste und Gegenstand eintragen.');return}
 try{
  await putItem(item);
  items=await getAllItems();
  clearForm();
  show('overview');
 }catch(e){
  alert('Speichern hat nicht geklappt. Das Foto ist eventuell zu groß. Versuch ein kleineres Foto oder speichere zuerst ohne Foto.');
  console.error(e);
 }
}

function editItemById(id){
 const i=items.find(x=>x.id===id);
 if(!i) return;
 editId=id; selectedPhotoBlob=null; keepOldPhoto=true;
 $('formTitle').textContent='Gegenstand bearbeiten';
 $('saveBtn').textContent='Update speichern';
 $('cancelBtn').classList.remove('hidden');
 ['article','box','cat','name','color','sizeField','qty','place','desc'].forEach(f=>$(f).value=i[f]||'');
 const src=photoSrc(i.photo);
 if(src){$('photoPreview').src=src;$('photoPreview').classList.remove('hidden')}else{$('photoPreview').classList.add('hidden')}
 show('add');
}

function clearForm(){
 ['article','box','cat','name','color','sizeField','place','desc'].forEach(id=>$(id).value='');
 $('qty').value='1';
 $('photoInput').value='';
 $('photoPreview').classList.add('hidden');
 editId=null; selectedPhotoBlob=null; keepOldPhoto=true;
 $('formTitle').textContent='Gegenstand hinzufügen';
 $('saveBtn').textContent='Speichern';
 $('cancelBtn').classList.add('hidden');
}

function cancelEdit(){clearForm();show('overview')}

async function deleteItemById(id){
 if(!confirm('Diesen Eintrag löschen?')) return;
 await deleteDBItem(id);
 items=await getAllItems();
 render();
}

async function clearAll(){
 if(!confirm('Wirklich alles löschen?')) return;
 await clearDB();
 items=[];
 render();
}

function cleanOldStorage(){
 OLD.forEach(k=>localStorage.removeItem(k));
 alert('Alte Speicherreste wurden gelöscht.');
}

function exportCSV(){
 const rows=[['Artikelnummer','Kiste','Kategorie','Gegenstand','Farbe','Größe','Menge','Standort','Beschreibung'],...items.map(i=>[i.article,i.box,i.cat,i.name,i.color,i.sizeField,i.qty,i.place,i.desc])];
 const csv=rows.map(r=>r.map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(';')).join('\n');
 const blob=new Blob(['\ufeff'+csv],{type:'text/csv'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kisten-inventar-backup.csv';a.click();
}

function parseLine(line){let out=[],cur='',q=false;for(let i=0;i<line.length;i++){let ch=line[i],nx=line[i+1];if(ch=='"'&&q&&nx=='"'){cur+='"';i++}else if(ch=='"')q=!q;else if(ch==';'&&!q){out.push(cur);cur=''}else cur+=ch}out.push(cur);return out}

async function importCSV(ev){
 const f=ev.target.files[0];if(!f)return;
 const r=new FileReader();
 r.onload=async x=>{
  const lines=x.target.result.split(/\r?\n/).filter(Boolean);
  const add=lines.slice(1).map(parseLine).map(row=>clean({article:row[0],box:row[1],cat:row[2],name:row[3],color:row[4],sizeField:row[5],qty:row[6],place:row[7],desc:row[8]})).filter(i=>i.box&&i.name);
  for(const item of add) await putItem(item);
  items=await getAllItems();
  render();
  alert(add.length+' Einträge importiert.');
 };
 r.readAsText(f,'utf-8');
}

init();
</script>
</body>
</html>
