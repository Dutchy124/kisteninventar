<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kisten Inventar</title>
<style>
body{margin:0;background:#f3f4f6;font-family:Arial,sans-serif;color:#111827}
header{background:#111827;color:white;padding:16px;position:sticky;top:0}
nav{display:flex;gap:8px;overflow:auto;margin-top:10px}
button{border:0;border-radius:10px;padding:11px 13px;font-weight:700;background:#2563eb;color:white;margin-top:8px}
nav button{background:#374151;white-space:nowrap}.active{background:white!important;color:#111827!important}
main{padding:14px;max-width:850px;margin:auto}.card{background:white;border-radius:15px;padding:14px;margin-bottom:14px;box-shadow:0 2px 10px #0001}
input,textarea{width:100%;box-sizing:border-box;border:1px solid #ccc;border-radius:10px;padding:12px;font-size:16px;margin:4px 0 10px}
textarea{min-height:75px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none}
.item,.box{border:1px solid #e5e7eb;border-radius:12px;padding:11px;margin-top:10px}.pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 8px;margin:3px;font-size:12px}
.good{background:#dcfce7;color:#166534}.bad{background:#fee2e2;color:#991b1b}.grey{background:#e5e7eb;color:#111827}
@media(max-width:600px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h2 style="margin:0">Kisten Inventar</h2>
<div style="font-size:13px;color:#d1d5db">Version 8.1 – Speichern repariert</div>
<nav>
<button id="tOverview" class="active" onclick="show('overview')">Übersicht</button>
<button id="tSearch" onclick="show('search')">Suche</button>
<button id="tAdd" onclick="show('add')">Hinzufügen</button>
<button id="tBackup" onclick="show('backup')">Backup</button>
</nav>
</header>
<main>
<section id="overview"><div class="card"><h3>Übersicht</h3><div id="stats"></div></div><div class="card"><h3>Kisten</h3><div id="boxes"></div></div></section>
<section id="search" class="hidden"><div class="card"><h3>Suche</h3><input id="q" placeholder="Artikelnummer, Name, Farbe, Größe, Kiste..." oninput="render()"><div id="count"></div></div><div class="card"><h3>Treffer</h3><div id="results"></div></div></section>
<section id="add" class="hidden"><div class="card">
<h3 id="formTitle">Gegenstand hinzufügen</h3>
<label>Artikelnummer</label><input id="article">
<div class="row"><div><label>Kiste</label><input id="box"></div><div><label>Kategorie</label><input id="cat"></div></div>
<label>Gegenstand</label><input id="name">
<div class="row"><div><label>Farbe</label><input id="color"></div><div><label>Größe</label><input id="sizeField"></div></div>
<div class="row"><div><label>Menge</label><input id="qty" type="number" min="1" value="1"></div><div><label>Standort</label><input id="place"></div></div>
<label>Beschreibung</label><textarea id="desc"></textarea>
<button onclick="saveItem()" id="saveBtn">Speichern</button>
<button class="grey hidden" id="cancelBtn" onclick="cancelEdit()">Abbrechen</button>
</div></section>
<section id="backup" class="hidden"><div class="card"><h3>Backup</h3>
<button class="grey" onclick="exportCSV()">CSV speichern</button>
<button class="grey" onclick="document.getElementById('importFile').click()">CSV importieren</button>
<button class="bad" onclick="clearAll()">Alles löschen</button>
<input id="importFile" type="file" accept=".csv,text/csv" style="display:none" onchange="importCSV(event)">
<p style="font-size:13px;color:#666">Vor Updates bitte kurz CSV speichern.</p>
</div></section>
</main>
<script>
const KEY='kistenInventarDataV81';
const OLD=['kistenInventarDataV8','kistenInventarEasyV7','kistenInventarEasyV6','kistenInventarEasyV4','kistenInventarEasyV3'];
let editIndex=null;
function $(id){return document.getElementById(id)}
function clean(i){return{article:i.article||'',box:i.box||'',cat:i.cat||'',name:i.name||'',color:i.color||'',sizeField:i.sizeField||i.itemSize||i.size||'',qty:i.qty||'1',place:i.place||'',desc:i.desc||'',photo:i.photo||'',updated:i.updated||''}}
function load(){for(const k of [KEY,...OLD]){try{let r=localStorage.getItem(k);if(r){let a=JSON.parse(r);if(Array.isArray(a))return a.map(clean)}}catch(e){}}return[]}
let items=load();
function store(){try{localStorage.setItem(KEY,JSON.stringify(items.map(clean)));OLD.forEach(k=>localStorage.removeItem(k));return true}catch(e){alert('Speichern klappt nicht. Wahrscheinlich ist der App-Speicher voll, oft wegen Fotos. Bitte zuerst CSV-Backup speichern.');return false}}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function show(id){['overview','search','add','backup'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden');['tOverview','tSearch','tAdd','tBackup'].forEach(x=>$(x).classList.remove('active'));$('t'+id[0].toUpperCase()+id.slice(1)).classList.add('active');render()}
function unique(a){return[...new Set(a.filter(Boolean))].sort((x,y)=>x.localeCompare(y,'de',{numeric:true}))}
function render(){
 let boxes=unique(items.map(i=>i.box)), cats=unique(items.map(i=>i.cat));
 $('stats').innerHTML=`<b>${items.reduce((s,i)=>s+(parseInt(i.qty)||1),0)}</b> Gegenstände · <b>${boxes.length}</b> Kisten · <b>${cats.length}</b> Kategorien`;
 $('boxes').innerHTML=boxes.length?boxes.map(b=>{let inside=items.filter(i=>i.box==b);let qty=inside.reduce((s,i)=>s+(parseInt(i.qty)||1),0);return `<div class="box" onclick="openBox('${esc(b).replaceAll("'","\\'")}')"><b>${esc(b)}</b><br><span class="pill">${inside.length} Einträge</span><span class="pill">${qty} Stück</span></div>`}).join(''):'Noch nichts eingetragen.';
 let q=($('q')?.value||'').toLowerCase().trim();
 let res=items.filter(i=>!q||[i.article,i.box,i.cat,i.name,i.color,i.sizeField,i.place,i.desc].join(' ').toLowerCase().includes(q));
 if($('count'))$('count').textContent=res.length+' Treffer von '+items.length+' Einträgen';
 if($('results'))$('results').innerHTML=res.length?res.map(card).join(''):'Keine Treffer gefunden.';
}
function card(i){let idx=items.indexOf(i);return `<div class="item"><b>${esc(i.name)}</b><br>${i.article?`<span class="pill good">Art.-Nr. ${esc(i.article)}</span>`:''}<span class="pill">${esc(i.box)}</span>${i.cat?`<span class="pill">${esc(i.cat)}</span>`:''}${i.color?`<span class="pill">Farbe: ${esc(i.color)}</span>`:''}${i.sizeField?`<span class="pill">Größe: ${esc(i.sizeField)}</span>`:''}<span class="pill">${esc(i.qty)}x</span>${i.place?`<p>Standort: ${esc(i.place)}</p>`:''}${i.desc?`<p>${esc(i.desc)}</p>`:''}<button class="good" onclick="editItem(${idx})">Bearbeiten</button> <button class="bad" onclick="deleteItem(${idx})">Löschen</button></div>`}
function openBox(b){show('search');$('q').value=b;render()}
function getForm(){return clean({article:$('article').value.trim(),box:$('box').value.trim(),cat:$('cat').value.trim(),name:$('name').value.trim(),color:$('color').value.trim(),sizeField:$('sizeField').value.trim(),qty:$('qty').value||'1',place:$('place').value.trim(),desc:$('desc').value.trim(),updated:new Date().toLocaleString('de-DE')})}
function saveItem(){let item=getForm();if(!item.box||!item.name){alert('Bitte mindestens Kiste und Gegenstand eintragen.');return}let old=[...items];if(editIndex!==null)items[editIndex]=item;else items.push(item);if(!store()){items=old;return}clearForm();show('overview')}
function editItem(idx){let i=clean(items[idx]);editIndex=idx;$('formTitle').textContent='Gegenstand bearbeiten';$('saveBtn').textContent='Update speichern';$('cancelBtn').classList.remove('hidden');['article','box','cat','name','color','sizeField','qty','place','desc'].forEach(id=>$(id).value=i[id]||'');show('add')}
function clearForm(){['article','box','cat','name','color','sizeField','place','desc'].forEach(id=>$(id).value='');$('qty').value='1';editIndex=null;$('formTitle').textContent='Gegenstand hinzufügen';$('saveBtn').textContent='Speichern';$('cancelBtn').classList.add('hidden')}
function cancelEdit(){clearForm();show('overview')}
function deleteItem(idx){if(confirm('Diesen Eintrag löschen?')){let old=[...items];items.splice(idx,1);if(!store())items=old;render()}}
function clearAll(){if(confirm('Wirklich alles löschen?')){items=[];store();render()}}
function exportCSV(){let rows=[['Artikelnummer','Kiste','Kategorie','Gegenstand','Farbe','Größe','Menge','Standort','Beschreibung'],...items.map(i=>[i.article,i.box,i.cat,i.name,i.color,i.sizeField,i.qty,i.place,i.desc])];let csv=rows.map(r=>r.map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(';')).join('\n');let blob=new Blob(['\ufeff'+csv],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kisten-inventar-backup.csv';a.click()}
function parseLine(line){let out=[],cur='',q=false;for(let i=0;i<line.length;i++){let ch=line[i],nx=line[i+1];if(ch=='"'&&q&&nx=='"'){cur+='"';i++}else if(ch=='"')q=!q;else if(ch==';'&&!q){out.push(cur);cur=''}else cur+=ch}out.push(cur);return out}
function importCSV(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=x=>{let lines=x.target.result.split(/\r?\n/).filter(Boolean);let add=lines.slice(1).map(parseLine).map(row=>clean({article:row[0],box:row[1],cat:row[2],name:row[3],color:row[4],sizeField:row[5],qty:row[6],place:row[7],desc:row[8]})).filter(i=>i.box&&i.name);items=items.concat(add);if(store()){render();alert(add.length+' Einträge importiert.')}};r.readAsText(f,'utf-8')}
store();render();
</script>
</body>
</html>
